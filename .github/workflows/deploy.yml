name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACR_NAME: bywtestacr0620
      ACI_NAME: byw-app
      RG: byw-test-rg
      LOCATION: eastasia
      DNS_LABEL: byw-teamflow
      IMAGE: bywtestacr0620.azurecr.io/byw-app:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/byw-app:cache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/byw-app:cache,mode=max

      - name: Redeploy ACI (FQDN 고정)
        run: |
          ACR_PASS=$(az acr credential show --name $ACR_NAME --query passwords[0].value -o tsv)

          # 기존 컨테이너 삭제
          az container delete \
            --name $ACI_NAME \
            --resource-group $RG \
            --yes 2>/dev/null || true

          # dns-name-label 포함 재생성 → FQDN 고정
          az container create \
            --name $ACI_NAME \
            --resource-group $RG \
            --image $IMAGE \
            --registry-login-server ${ACR_NAME}.azurecr.io \
            --registry-username $ACR_NAME \
            --registry-password "$ACR_PASS" \
            --cpu 1 --memory 1.5 \
            --ports 80 \
            --ip-address Public \
            --dns-name-label $DNS_LABEL \
            --os-type Linux \
            --location $LOCATION \
            --environment-variables \
              GITHUB_TOKEN="${{ secrets.GH_TOKEN }}" \
              GITHUB_CLIENT_ID="${{ secrets.GH_CLIENT_ID }}" \
              GITHUB_CLIENT_SECRET="${{ secrets.GH_CLIENT_SECRET }}" \
              FRONTEND_URL="http://${DNS_LABEL}.${LOCATION}.azurecontainer.io" \
            --restart-policy Always

      - name: Health Check
        run: |
          FQDN="${DNS_LABEL}.${LOCATION}.azurecontainer.io"
          echo "🌐 FQDN: http://$FQDN"

          echo "⏳ Waiting for container to be ready..."
          for i in $(seq 1 12); do
            sleep 10
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 "http://$FQDN/health" || echo "000")
            echo "  attempt $i → HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s "http://$FQDN/health" | python3 -m json.tool
              exit 0
            fi
          done
          echo "❌ Health check failed after 2 minutes"
          az container logs --name $ACI_NAME --resource-group $RG || true
          exit 1
