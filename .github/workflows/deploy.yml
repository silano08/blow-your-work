name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ACR_NAME: bywtestacr0620
      ACA_NAME: byw-app
      ACA_ENV: byw-env
      RG: byw-test-rg
      LOCATION: eastasia
      IMAGE: bywtestacr0620.azurecr.io/byw-app:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/byw-app:cache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/byw-app:cache,mode=max

      - name: Deploy to Azure Container Apps
        run: |
          ACR_PASS=$(az acr credential show --name $ACR_NAME --query passwords[0].value -o tsv)

          # Container App이 이미 있으면 update, 없으면 create
          if az containerapp show --name $ACA_NAME --resource-group $RG &>/dev/null; then
            az containerapp update \
              --name $ACA_NAME \
              --resource-group $RG \
              --image $IMAGE \
              --set-env-vars \
                GITHUB_TOKEN="${{ secrets.GH_TOKEN }}" \
                GITHUB_CLIENT_ID="${{ secrets.GH_CLIENT_ID }}" \
                GITHUB_CLIENT_SECRET="${{ secrets.GH_CLIENT_SECRET }}" \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
                AZURE_OPENAI_DEPLOYMENT="gpt-4o"
          else
            az containerapp create \
              --name $ACA_NAME \
              --resource-group $RG \
              --environment $ACA_ENV \
              --image $IMAGE \
              --registry-server ${ACR_NAME}.azurecr.io \
              --registry-username $ACR_NAME \
              --registry-password "$ACR_PASS" \
              --target-port 80 \
              --ingress external \
              --cpu 0.5 --memory 1.0Gi \
              --min-replicas 1 --max-replicas 1 \
              --env-vars \
                GITHUB_TOKEN="${{ secrets.GH_TOKEN }}" \
                GITHUB_CLIENT_ID="${{ secrets.GH_CLIENT_ID }}" \
                GITHUB_CLIENT_SECRET="${{ secrets.GH_CLIENT_SECRET }}" \
                AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
                AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
                AZURE_OPENAI_DEPLOYMENT="gpt-4o"
          fi

          # FQDN 출력
          FQDN=$(az containerapp show --name $ACA_NAME --resource-group $RG \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "🌐 FQDN: https://$FQDN"
          echo "ACA_FQDN=https://$FQDN" >> $GITHUB_ENV

          # FRONTEND_URL 업데이트
          az containerapp update \
            --name $ACA_NAME \
            --resource-group $RG \
            --set-env-vars FRONTEND_URL="https://$FQDN" 2>/dev/null || true

      - name: Health Check
        run: |
          echo "⏳ Waiting for container app to be ready..."
          for i in $(seq 1 18); do
            sleep 10
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$ACA_FQDN/health" || echo "000")
            echo "  attempt $i → HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s "$ACA_FQDN/health" | python3 -m json.tool
              exit 0
            fi
          done
          echo "❌ Health check failed"
          az containerapp logs show --name $ACA_NAME --resource-group $RG || true
          exit 1
