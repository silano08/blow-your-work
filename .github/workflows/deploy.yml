name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name bywtestacr0620

      - name: Build & Push (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: bywtestacr0620.azurecr.io/byw-app:latest
          cache-from: type=registry,ref=bywtestacr0620.azurecr.io/byw-app:cache
          cache-to: type=registry,ref=bywtestacr0620.azurecr.io/byw-app:cache,mode=max

      - name: Redeploy on Azure Container Instances
        run: |
          ACR_PASS=$(az acr credential show --name bywtestacr0620 --query passwords[0].value -o tsv)

          az container delete \
            --name byw-app \
            --resource-group byw-test-rg \
            --yes || true

          az container create \
            --name byw-app \
            --resource-group byw-test-rg \
            --image bywtestacr0620.azurecr.io/byw-app:latest \
            --registry-login-server bywtestacr0620.azurecr.io \
            --registry-username bywtestacr0620 \
            --registry-password "$ACR_PASS" \
            --cpu 1 --memory 1.5 \
            --ports 80 \
            --ip-address Public \
            --os-type Linux \
            --location eastasia \
            --environment-variables \
              GITHUB_TOKEN="${{ secrets.GH_TOKEN }}" \
              AZURE_SPEECH_REGION="koreacentral" \
            --restart-policy Always

      - name: Health Check & Print URL
        run: |
          sleep 15
          IP=$(az container show --name byw-app --resource-group byw-test-rg --query ipAddress.ip -o tsv)
          echo "🚀 Deployed at: http://$IP"
          curl -sf "http://$IP/health" && echo "✅ Health check passed!"
