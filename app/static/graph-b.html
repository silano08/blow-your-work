<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TeamFlow — 전사 업무 연관도</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F6F6F9;font-family:'Pretendard',-apple-system,sans-serif;overflow:hidden;height:100vh;color:#151515;letter-spacing:-0.02em}
#header{position:fixed;top:0;left:0;right:0;z-index:10;height:52px;background:#fff;border-bottom:1px solid #E5E5E8;display:flex;align-items:center;padding:0 20px;gap:12px;flex-wrap:nowrap}
#header h1{font-size:13px;font-weight:700;color:#F85100;letter-spacing:-0.03em;white-space:nowrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#888;white-space:nowrap}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sep{width:1px;height:20px;background:#E5E5E8;flex-shrink:0}
.filters{margin-left:auto;display:flex;gap:5px}
.fb{padding:0 11px;height:28px;border-radius:9999px;border:1.5px solid #E5E5E8;background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:#888;font-family:inherit;letter-spacing:-0.02em;transition:all .15s}
.fb.on{border-color:#F85100;color:#F85100;background:#FFEFE7}
/* 우측 패널 */
#panel{position:fixed;top:52px;right:0;bottom:0;width:272px;background:#fff;border-left:1px solid #E5E5E8;transform:translateX(100%);transition:transform .25s ease;z-index:20;display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
#panel-head{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
#panel-title{font-size:15px;font-weight:700;letter-spacing:-0.03em;line-height:1.3}
#panel-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;padding:0;flex-shrink:0}
#panel-body{padding:12px 16px;overflow-y:auto;flex:1}
.p-type{font-size:11px;color:#888;margin-bottom:12px}
.p-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:600;margin-bottom:12px}
.p-prog-wrap{margin-bottom:14px}
.p-prog-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.p-prog-bar{height:4px;background:#E5E5E8;border-radius:9999px;overflow:hidden}
.p-prog-fill{height:100%;border-radius:9999px;transition:width .5s}
.p-sec{font-size:10px;font-weight:700;color:#B0B0B3;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px}
.p-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#F6F6F9;border-radius:8px;margin-bottom:4px;cursor:pointer;font-size:12px;border:1.5px solid transparent;transition:border-color .15s}
.p-item:hover{border-color:#F85100}
.p-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.p-status-done{color:#1A9F46;font-size:11px;font-weight:600;margin-left:auto;flex-shrink:0}
.p-status-doing{color:#FF6114;font-size:11px;font-weight:600;margin-left:auto;flex-shrink:0}
/* 툴팁 */
#tt{position:fixed;pointer-events:none;z-index:999;background:#151515;color:#fff;border-radius:8px;padding:8px 12px;font-size:12px;max-width:200px;display:none;letter-spacing:-0.02em}
#tt-t{font-weight:700;margin-bottom:2px}
#tt-m{color:rgba(255,255,255,.65);font-size:10px}
/* SVG */
svg{display:block;margin-top:52px}
.link{fill:none;stroke:#E5E5E8;stroke-width:1.5}
.link.cross{stroke:#FFCFBD;stroke-width:2;stroke-dasharray:4,3}
.link.hl{stroke:#F85100;stroke-width:2.5;opacity:1!important}
.link.dim{opacity:0.06}
.node circle{cursor:pointer;transition:filter .15s}
.node text{pointer-events:none;font-family:'Pretendard',-apple-system,sans-serif;letter-spacing:-0.02em}
.node.dim circle{opacity:0.1}
.node.dim text{opacity:0.08}
.node.selected circle{filter:drop-shadow(0 0 6px rgba(248,81,0,0.6))}
</style>
</head>
<body>
<div id="header">
  <h1>💥 TeamFlow</h1>
  <div class="sep"></div>
  <div class="leg"><div class="ld" style="background:#F85100"></div>나</div>
  <div class="leg"><div class="ld" style="background:#FFAF8A"></div>개발팀</div>
  <div class="leg"><div class="ld" style="background:#B0B0B3"></div>타팀</div>
  <div class="leg"><div class="ld" style="background:#151515"></div>이니셔티브</div>
  <div class="leg"><div class="ld" style="background:#888"></div>목표</div>
  <div class="filters">
    <button class="fb on" onclick="setFilter('all',this)">전체</button>
    <button class="fb" onclick="setFilter('dev',this)">개발</button>
    <button class="fb" onclick="setFilter('plan',this)">기획</button>
    <button class="fb" onclick="setFilter('sales',this)">영업</button>
    <button class="fb" onclick="setFilter('acct',this)">회계</button>
  </div>
</div>

<div id="panel">
  <div id="panel-head">
    <div id="panel-title"></div>
    <button id="panel-close" onclick="closePanel()">×</button>
  </div>
  <div id="panel-body"></div>
</div>

<div id="tt"><div id="tt-t"></div><div id="tt-m"></div></div>
<svg id="svg"></svg>

<script>
const ME_ID = 'kimdo'; // 내 식별자
const ME_TEAM = 'dev';
const TEAM_NAME = {dev:'개발팀',plan:'기획팀',sales:'영업팀',acct:'회계팀'};

const NODES = [
  // 이니셔티브 (5개) — pct: 완료율
  {id:'i1',label:'반복업무 자동화',     type:'initiative',team:'dev', pct:72,size:19},
  {id:'i2',label:'커뮤니케이션 효율화', type:'initiative',team:'dev', pct:55,size:17},
  {id:'i3',label:'결제 안정성 강화',    type:'initiative',team:'acct',pct:80,size:18},
  {id:'i4',label:'고객 UX 혁신',        type:'initiative',team:'plan',pct:40,size:16},
  {id:'i5',label:'Q3 매출 달성',        type:'initiative',team:'sales',pct:62,size:18},

  // 목표 (10개)
  {id:'g1',label:'DML 자동화',        type:'goal',team:'dev', pct:75,size:11},
  {id:'g2',label:'CI/CD 구축',        type:'goal',team:'dev', pct:67,size:11},
  {id:'g3',label:'Slack 리포트',      type:'goal',team:'dev', pct:60,size:10},
  {id:'g4',label:'온보딩 문서화',     type:'goal',team:'dev', pct:50,size:10},
  {id:'g5',label:'결제 오류 감지',    type:'goal',team:'acct',pct:85,size:11},
  {id:'g6',label:'정산 자동화',       type:'goal',team:'acct',pct:75,size:10},
  {id:'g7',label:'UX 인터뷰',         type:'goal',team:'plan',pct:45,size:10},
  {id:'g8',label:'IA 재설계',         type:'goal',team:'plan',pct:35,size:10},
  {id:'g9',label:'리드 전환율',       type:'goal',team:'sales',pct:55,size:11},
  {id:'g10',label:'신규 채널 발굴',   type:'goal',team:'sales',pct:48,size:10},

  // 할일 — mine: 내 작업
  {id:'t1',label:'DML 스크립트',       type:'todo',team:'dev', person:'김도현',mine:true, done:true, size:8},
  {id:'t2',label:'자동화 테스트',      type:'todo',team:'dev', person:'김도현',mine:true, done:false,size:8},
  {id:'t3',label:'Slack 봇 연동',      type:'todo',team:'dev', person:'김도현',mine:true, done:true, size:8},
  {id:'t4',label:'Actions 배포',       type:'todo',team:'dev', person:'박민준',mine:false,done:true, size:7},
  {id:'t5',label:'Docker 최적화',      type:'todo',team:'dev', person:'박민준',mine:false,done:true, size:7},
  {id:'t6',label:'API 캐싱 개선',      type:'todo',team:'dev', person:'이지훈',mine:false,done:false,size:7},
  {id:'t7',label:'테크 위키 작성',     type:'todo',team:'dev', person:'이지훈',mine:false,done:true, size:7},
  {id:'t8',label:'코드 리뷰 체크리스트',type:'todo',team:'dev',person:'박민준',mine:false,done:false,size:7},
  {id:'t9',label:'UX 인터뷰 진행',     type:'todo',team:'plan',person:'최서연',mine:false,done:true, size:7},
  {id:'t10',label:'인사이트 문서화',   type:'todo',team:'plan',person:'최서연',mine:false,done:false,size:7},
  {id:'t11',label:'IA 와이어프레임',   type:'todo',team:'plan',person:'김하늘',mine:false,done:false,size:7},
  {id:'t12',label:'사용성 테스트',     type:'todo',team:'plan',person:'김하늘',mine:false,done:true, size:7},
  {id:'t13',label:'경쟁사 벤치마크',  type:'todo',team:'sales',person:'정태양',mine:false,done:true, size:7},
  {id:'t14',label:'신규 리드 발굴',    type:'todo',team:'sales',person:'정태양',mine:false,done:true, size:7},
  {id:'t15',label:'파트너 미팅',       type:'todo',team:'sales',person:'유수현',mine:false,done:false,size:7},
  {id:'t16',label:'채널 분석 리포트',  type:'todo',team:'sales',person:'유수현',mine:false,done:false,size:7},
  {id:'t17',label:'월별 마감 검토',    type:'todo',team:'acct',person:'이수아', mine:false,done:true, size:7},
  {id:'t18',label:'결제 알림 시스템',  type:'todo',team:'acct',person:'이수아', mine:false,done:true, size:7},
  {id:'t19',label:'정산 쿼리 스크립트',type:'todo',team:'acct',person:'장은지', mine:false,done:true, size:7},
  {id:'t20',label:'이상 거래 탐지',    type:'todo',team:'acct',person:'장은지', mine:false,done:false,size:7},
  {id:'t21',label:'규정 준수 체크',    type:'todo',team:'acct',person:'이수아', mine:false,done:true, size:7},
];

const EDGES = [
  // 할일 → 목표
  ['t1','g1'],['t2','g1'],['t6','g1'],
  ['t4','g2'],['t5','g2'],['t8','g2'],
  ['t3','g3'],
  ['t7','g4'],
  ['t18','g5'],['t20','g5'],['t21','g5'],
  ['t17','g6'],['t19','g6'],
  ['t9','g7'],['t10','g7'],
  ['t11','g8'],['t12','g8'],
  ['t13','g9'],['t14','g9'],
  ['t15','g10'],['t16','g10'],
  // 목표 → 이니셔티브
  ['g1','i1'],['g2','i1'],['g3','i2'],['g4','i2'],
  ['g5','i3'],['g6','i3'],
  ['g7','i4'],['g8','i4'],
  ['g9','i5'],['g10','i5'],
  // 크로스팀 연결
  ['t1','t19'],['t3','t18'],['t2','t10'],
];

const CROSS_SET = new Set(['t1-t19','t3-t18','t2-t10']);

function nodeColor(n){
  if(n.type==='initiative') return '#151515';
  if(n.type==='goal')       return '#6D6D6D';
  if(n.mine)                return n.done?'#F85100':'#FF6114';
  if(n.team===ME_TEAM)      return n.done?'#FFAF8A':'#FFCFBD';
  return n.done?'#888888':'#B0B0B3';
}
function nodeStroke(n){
  if(n.type==='initiative') return 'none';
  if(n.mine)                return '#F85100';
  if(n.team===ME_TEAM)      return '#FFAF8A';
  return '#D4D4D6';
}
function progColor(pct){
  if(pct>=80)return'#1A9F46';
  if(pct>=50)return'#FF6114';
  return'#FF4242';
}

const W=window.innerWidth,H=window.innerHeight-52;
const svg=d3.select('#svg').attr('width',W).attr('height',H);
const g=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.2,3]).on('zoom',e=>g.attr('transform',e.transform)));

const edgeData=EDGES.map(([s,t])=>({source:s,target:t,cross:CROSS_SET.has(s+'-'+t)}));

const sim=d3.forceSimulation(NODES)
  .force('link',d3.forceLink(edgeData).id(d=>d.id)
    .distance(d=>{
      const s=d.source,t=d.target;
      if((typeof s==='object'?s.type:'')==='initiative') return 110;
      if((typeof s==='object'?s.type:'')==='goal') return 70;
      return 50;
    }).strength(0.7))
  .force('charge',d3.forceManyBody().strength(d=>d.type==='initiative'?-500:d.type==='goal'?-220:-100))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collision',d3.forceCollide(d=>d.size+10));

const linkSel=g.append('g').selectAll('line')
  .data(edgeData).join('line')
  .attr('class',d=>d.cross?'link cross':'link');

const nodeSel=g.append('g').selectAll('g')
  .data(NODES).join('g').attr('class','node')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
  .on('click',(e,d)=>{e.stopPropagation();selectNode(d);})
  .on('mouseover',(e,d)=>{
    const tt=document.getElementById('tt');
    document.getElementById('tt-t').textContent=d.label;
    let meta='';
    if(d.type==='initiative') meta=`🚀 이니셔티브 · ${d.pct}% 달성`;
    else if(d.type==='goal')  meta=`🎯 목표 · ${d.pct}% 완료`;
    else meta=`${d.mine?'👤 나 ':'👥 '}${d.person||''} · ${TEAM_NAME[d.team]} · ${d.done?'✅ 완료':'🔄 진행중'}`;
    document.getElementById('tt-m').textContent=meta;
    tt.style.display='block';tt.style.left=(e.pageX+14)+'px';tt.style.top=(e.pageY-10)+'px';
  })
  .on('mousemove',e=>{
    const tt=document.getElementById('tt');
    tt.style.left=(e.pageX+14)+'px';tt.style.top=(e.pageY-10)+'px';
  })
  .on('mouseleave',()=>{ document.getElementById('tt').style.display='none'; });

nodeSel.append('circle')
  .attr('r',d=>d.size)
  .attr('fill',d=>nodeColor(d))
  .attr('stroke',d=>nodeStroke(d))
  .attr('stroke-width',d=>d.mine?2.5:d.type==='goal'?1.5:0);

nodeSel.append('text')
  .attr('dy',d=>-(d.size+5))
  .attr('text-anchor','middle')
  .attr('font-size',d=>d.type==='initiative'?12:d.type==='goal'?11:10)
  .attr('font-weight',d=>d.type==='initiative'?700:d.type==='goal'?600:400)
  .attr('fill',d=>d.type==='initiative'?'#151515':d.mine?'#F85100':'#6D6D6D')
  .text(d=>d.label);

sim.on('tick',()=>{
  linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
         .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

svg.on('click',()=>{ deselectNode(); closePanel(); });

let selectedId=null;
const nodeMap={};
NODES.forEach(n=>nodeMap[n.id]=n);

function getConnected(id){
  const s=new Set([id]);
  EDGES.forEach(([a,b])=>{if(a===id)s.add(b);if(b===id)s.add(a);});
  return s;
}

function selectNode(d){
  selectedId=d.id;
  const conn=getConnected(d.id);
  nodeSel.classed('dim',n=>!conn.has(n.id));
  nodeSel.classed('selected',n=>n.id===d.id);
  linkSel.classed('hl',l=>l.source.id===d.id||l.target.id===d.id);
  linkSel.classed('dim',l=>l.source.id!==d.id&&l.target.id!==d.id);
  openPanel(d,conn);
}
function deselectNode(){
  selectedId=null;
  nodeSel.classed('dim',false).classed('selected',false);
  linkSel.classed('hl',false).classed('dim',false);
}

function openPanel(d,conn){
  const typeLabel={initiative:'🚀 이니셔티브',goal:'🎯 목표',todo:'✅ 할일'};
  document.getElementById('panel-title').textContent=d.label;
  const pc=d.pct!=null?progColor(d.pct):'#FF6114';

  let html=`<div class="p-type">${typeLabel[d.type]||''} · ${TEAM_NAME[d.team]}</div>`;

  if(d.type==='todo'){
    const statusCol=d.done?'#1A9F46':'#FF6114';
    html+=`<span class="p-badge" style="background:${d.done?'#E8F9F0':'#FFF4EE'};color:${statusCol}">${d.done?'✅ 완료':'🔄 진행중'}</span>`;
    if(d.mine) html+=`<span class="p-badge" style="background:#FFEFE7;color:#F85100;margin-left:4px">👤 나의 작업</span>`;
    if(d.person) html+=`<div style="font-size:12px;color:#888;margin-bottom:12px">담당: ${d.person}</div>`;
  }

  if(d.pct!=null){
    html+=`<div class="p-prog-wrap">
      <div class="p-prog-label"><span>진척도</span><span style="color:${pc};font-weight:700">${d.pct}%</span></div>
      <div class="p-prog-bar"><div class="p-prog-fill" style="width:${d.pct}%;background:${pc}"></div></div>
    </div>`;
  }

  // 연결된 노드들
  const connNodes=[...conn].filter(id=>id!==d.id).map(id=>nodeMap[id]).filter(Boolean);
  if(connNodes.length){
    const byType={initiative:[],goal:[],todo:[]};
    connNodes.forEach(n=>byType[n.type].push(n));
    const order=['initiative','goal','todo'];
    const secName={initiative:'이니셔티브',goal:'목표',todo:'할일'};
    order.forEach(t=>{
      if(!byType[t].length) return;
      html+=`<div class="p-sec">${secName[t]} (${byType[t].length})</div>`;
      byType[t].forEach(n=>{
        const col=nodeColor(n);
        const status=n.type==='todo'
          ?`<span class="${n.done?'p-status-done':'p-status-doing'}">${n.done?'완료':'진행중'}</span>`
          :n.pct!=null?`<span style="color:${progColor(n.pct)};font-size:11px;font-weight:700;margin-left:auto">${n.pct}%</span>`:'';
        html+=`<div class="p-item" onclick="selectNodeById('${n.id}')">
          <div class="p-dot" style="background:${col}"></div>
          <span>${n.label}</span>${status}
        </div>`;
      });
    });
  }

  // 크로스팀 연결
  const crossConn=connNodes.filter(n=>n.type==='todo'&&n.team!==ME_TEAM);
  if(crossConn.length){
    html+=`<div style="margin-top:14px;padding:10px;background:#FFF4EE;border-radius:8px;border:1px solid #FFCFBD">
      <div style="font-size:10px;font-weight:700;color:#F85100;margin-bottom:5px">🔗 크로스팀 연관</div>
      ${crossConn.map(n=>`<div style="font-size:11px;color:#888;margin-bottom:2px">${TEAM_NAME[n.team]} · ${n.person} — ${n.label}</div>`).join('')}
    </div>`;
  }

  document.getElementById('panel-body').innerHTML=html;
  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  deselectNode();
}

function selectNodeById(id){
  const n=nodeMap[id];
  if(n)selectNode(n);
}

let curFilter='all';
function setFilter(team,btn){
  curFilter=team;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(team==='all'){
    nodeSel.classed('dim',false);
    linkSel.classed('dim',false);
  } else {
    const relevant=new Set(NODES.filter(n=>n.team===team||n.type==='initiative'||n.type==='goal').map(n=>n.id));
    nodeSel.classed('dim',n=>n.type==='todo'&&n.team!==team);
    linkSel.classed('dim',l=>{
      const si=typeof l.source==='object'?l.source.id:l.source;
      const ti=typeof l.target==='object'?l.target.id:l.target;
      return !relevant.has(si)||!relevant.has(ti);
    });
  }
}

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight-52;
  svg.attr('width',w).attr('height',h);
  sim.force('center',d3.forceCenter(w/2,h/2)).alpha(0.3).restart();
});
</script>
</body>
</html>
