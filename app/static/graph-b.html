<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>후보 B — 3D 네트워크 (Three.js)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#050810; overflow:hidden; height:100vh; font-family:-apple-system,sans-serif; color:#fff; }
  #canvas-container { position:fixed; inset:0; }
  #ui { position:fixed; top:0; left:0; right:0; z-index:10; }
  #header { display:flex; align-items:center; gap:12px; padding:14px 22px; background:rgba(5,8,16,0.8); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.06); }
  #header h1 { font-size:14px; font-weight:700; color:#f8914e; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
  .legend { display:flex; gap:14px; margin-left:auto; }
  .leg { display:flex; align-items:center; gap:5px; font-size:11px; color:rgba(255,255,255,0.5); }
  #info-panel {
    position:fixed; right:20px; top:70px; width:270px;
    background:rgba(10,14,26,0.92); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08); border-radius:14px;
    padding:18px; display:none; z-index:20;
  }
  #info-panel h3 { font-size:14px; font-weight:700; margin-bottom:4px; }
  #info-panel .ip-type { font-size:11px; opacity:0.5; margin-bottom:14px; }
  #info-panel .ip-section { font-size:11px; font-weight:700; opacity:0.4; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
  .ip-node { display:flex; align-items:center; gap:8px; padding:6px 8px; background:rgba(255,255,255,0.04); border-radius:7px; margin-bottom:4px; cursor:pointer; font-size:12px; }
  .ip-node:hover { background:rgba(255,255,255,0.08); }
  .ip-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  #hint { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-size:12px; color:rgba(255,255,255,0.3); background:rgba(5,8,16,0.7); padding:6px 16px; border-radius:100px; }
  #close-info { position:absolute; top:12px; right:14px; background:none; border:none; color:rgba(255,255,255,0.4); font-size:18px; cursor:pointer; }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui">
  <div id="header">
    <h1>💥 TeamFlow — 3D 지식 네트워크</h1>
    <div class="legend">
      <div class="leg"><span class="dot" style="background:#ff5500"></span>나</div>
      <div class="leg"><span class="dot" style="background:#4d9eff"></span>개발팀원</div>
      <div class="leg"><span class="dot" style="background:#9b59ff"></span>타팀</div>
      <div class="leg"><span class="dot" style="background:#00e5a0"></span>이니셔티브</div>
      <div class="leg"><span class="dot" style="background:#ffd166"></span>목표</div>
    </div>
    <span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:16px">드래그·줌·클릭</span>
  </div>
</div>

<div id="info-panel">
  <button id="close-info" onclick="closeInfo()">×</button>
  <h3 id="ip-title"></h3>
  <div class="ip-type" id="ip-type"></div>
  <div class="ip-section">연관 업무</div>
  <div id="ip-list"></div>
</div>

<div id="hint">마우스 드래그로 회전 · 휠로 줌 · 노드 클릭으로 연관 탐색</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── 데이터 ──────────────────────────────────────────────────────────────
// 팀 정의
const TEAMS = {
  dev:  { name:'개발팀',  color:0x4d9eff, hex:'#4d9eff' },
  plan: { name:'기획팀',  color:0xb45eff, hex:'#b45eff' },
  sales:{ name:'영업팀',  color:0x00c896, hex:'#00c896' },
  acct: { name:'회계팀',  color:0xff9f43, hex:'#ff9f43' },
};

// 이니셔티브 (상위 목표 — 가장 큰 노드)
const INITIATIVES = [
  { id:'i1', label:'반복업무 전면 자동화', group:'initiative', size:2.6, team:'dev',  desc:'DML·배포·알림 등 수작업 90% 제거' },
  { id:'i2', label:'커뮤니케이션 효율화', group:'initiative', size:2.3, team:'dev',  desc:'Slack 봇·리포트 자동 발송' },
  { id:'i3', label:'결제·정산 안정성 강화', group:'initiative', size:2.4, team:'acct', desc:'오류 0건, 정산 자동화' },
  { id:'i4', label:'고객 UX 개선',         group:'initiative', size:2.2, team:'plan', desc:'인터뷰→제품 반영 사이클 단축' },
  { id:'i5', label:'Q3 매출 목표 달성',    group:'initiative', size:2.5, team:'sales', desc:'신규 계약 15건, ARR 30% 성장' },
];

// 목표 (중간 노드)
const GOALS = [
  { id:'g1', label:'DML 처리 자동화',     group:'goal', size:1.7, parent:'i1', team:'dev' },
  { id:'g2', label:'CI/CD 파이프라인 구축', group:'goal', size:1.6, parent:'i1', team:'dev' },
  { id:'g3', label:'Slack 일일 리포트',    group:'goal', size:1.5, parent:'i2', team:'dev' },
  { id:'g4', label:'매일 답장 자동화',     group:'goal', size:1.4, parent:'i2', team:'dev' },
  { id:'g5', label:'결제 오류 실시간 감지', group:'goal', size:1.6, parent:'i3', team:'acct' },
  { id:'g6', label:'정산 쿼리 자동화',     group:'goal', size:1.5, parent:'i3', team:'acct' },
  { id:'g7', label:'UX 인터뷰 인사이트',  group:'goal', size:1.5, parent:'i4', team:'plan' },
  { id:'g8', label:'온보딩 플로우 개선',   group:'goal', size:1.4, parent:'i4', team:'plan' },
  { id:'g9', label:'리드 전환율 개선',     group:'goal', size:1.6, parent:'i5', team:'sales' },
  { id:'g10',label:'계약서 전자화',        group:'goal', size:1.4, parent:'i5', team:'sales' },
];

// 할일 노드 (팀원별)
const TODOS = [
  // 개발팀 — 김도현(me)
  { id:'t1',  label:'DML 자동화 스크립트 작성', group:'me',    size:1.3, person:'김도현', team:'dev',   goal:'g1' },
  { id:'t2',  label:'자동화 테스트 케이스 추가', group:'me',    size:1.1, person:'김도현', team:'dev',   goal:'g1' },
  { id:'t3',  label:'Slack 봇 리포트 연동',      group:'me',    size:1.2, person:'김도현', team:'dev',   goal:'g3' },
  // 개발팀 — 박민준
  { id:'t4',  label:'GitHub Actions 배포 설정', group:'team',  size:1.4, person:'박민준', team:'dev',   goal:'g2' },
  { id:'t5',  label:'Docker 빌드 최적화',        group:'team',  size:1.1, person:'박민준', team:'dev',   goal:'g2' },
  { id:'t6',  label:'PR 자동 머지 설정',         group:'team',  size:1.0, person:'박민준', team:'dev',   goal:'g2' },
  // 개발팀 — 이지훈
  { id:'t7',  label:'API 응답 캐싱 개선',        group:'team',  size:1.1, person:'이지훈', team:'dev',   goal:'g1' },
  { id:'t8',  label:'DB 인덱스 최적화',          group:'team',  size:1.2, person:'이지훈', team:'dev',   goal:'g1' },
  // 기획팀 — 최서연
  { id:'t9',  label:'UX 인터뷰 2건 진행',        group:'other', size:1.3, person:'최서연', team:'plan',  goal:'g7' },
  { id:'t10', label:'인터뷰 인사이트 문서화',     group:'other', size:1.1, person:'최서연', team:'plan',  goal:'g7' },
  { id:'t11', label:'온보딩 화면 와이어프레임',   group:'other', size:1.2, person:'최서연', team:'plan',  goal:'g8' },
  // 기획팀 — 한지민
  { id:'t12', label:'AB 테스트 시나리오 작성',    group:'other', size:1.0, person:'한지민', team:'plan',  goal:'g8' },
  { id:'t13', label:'사용성 테스트 결과 분석',    group:'other', size:1.1, person:'한지민', team:'plan',  goal:'g7' },
  // 영업팀 — 정태양
  { id:'t14', label:'신규 리드 10건 발굴',        group:'other', size:1.3, person:'정태양', team:'sales', goal:'g9' },
  { id:'t15', label:'데모 영상 제작',             group:'other', size:1.0, person:'정태양', team:'sales', goal:'g9' },
  // 영업팀 — 오현우
  { id:'t16', label:'계약서 전자서명 도입',        group:'other', size:1.2, person:'오현우', team:'sales', goal:'g10' },
  { id:'t17', label:'CRM 데이터 업데이트',         group:'other', size:1.0, person:'오현우', team:'sales', goal:'g9' },
  // 회계팀 — 이수아
  { id:'t18', label:'결제 오류 알림 시스템 구축',  group:'other', size:1.3, person:'이수아', team:'acct',  goal:'g5' },
  { id:'t19', label:'정산 쿼리 자동화 스크립트',   group:'other', size:1.2, person:'이수아', team:'acct',  goal:'g6' },
  // 회계팀 — 윤성진
  { id:'t20', label:'월말 정산 보고서 자동화',     group:'other', size:1.1, person:'윤성진', team:'acct',  goal:'g6' },
  { id:'t21', label:'이상 거래 탐지 룰 작성',     group:'other', size:1.0, person:'윤성진', team:'acct',  goal:'g5' },
];

const NODES = [...INITIATIVES, ...GOALS, ...TODOS];

// 엣지: 할일→목표, 목표→이니셔티브, 팀간 협업
const EDGES = [
  // 할일 → 목표
  ...TODOS.map(t => [t.id, t.goal]),
  // 목표 → 이니셔티브
  ...GOALS.map(g => [g.id, g.parent]),
  // 팀간 협업 (크로스팀 엣지)
  ['t1','t19'],   // 개발-회계: DML 자동화 공유
  ['t3','t18'],   // 개발-회계: Slack 알림 연동
  ['t4','t16'],   // 개발-영업: 계약서 전자화 API
  ['t9','t12'],   // 기획-기획: 인터뷰↔AB테스트
  ['t10','t11'],  // 기획 내부: 인사이트→와이어프레임
  ['t14','t9'],   // 영업-기획: 리드 인터뷰 협업
  ['g1','g6'],    // 자동화 목표 공유
  ['g3','g5'],    // Slack 알림↔결제 감지 연동
  ['i1','i3'],    // 이니셔티브 연결: 자동화→결제안정성
];

// 컬러 매핑
const GROUP_COLOR = {
  me:         { main:0xff5500, hex:'#ff5500' },
  team:       { main:0x4d9eff, hex:'#4d9eff' },
  other:      { main:0x9b59ff, hex:'#9b59ff' },
  initiative: { main:0x00e5a0, hex:'#00e5a0' },
  goal:       { main:0xffd166, hex:'#ffd166' },
};
const COLOR     = Object.fromEntries(Object.entries(GROUP_COLOR).map(([k,v])=>[k,v.main]));
const COLOR_HEX = Object.fromEntries(Object.entries(GROUP_COLOR).map(([k,v])=>[k,v.hex]));

// ── Three.js 셋업 ────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050810);
scene.fog = new THREE.FogExp2(0x050810, 0.012);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 1000);
camera.position.set(0, 0, 55);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(W, H);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// 조명
scene.add(new THREE.AmbientLight(0x1a1a2e, 3));
const point1 = new THREE.PointLight(0xff5500, 2, 120);
point1.position.set(30, 30, 30);
scene.add(point1);
const point2 = new THREE.PointLight(0x4d9eff, 1.5, 100);
point2.position.set(-30, -20, 20);
scene.add(point2);

// 배경 별
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000);
for (let i = 0; i < 3000; i++) starPos[i] = (Math.random()-0.5)*400;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0xffffff, size:0.3, opacity:0.4, transparent:true })));

// 노드 위치 초기화 (force layout 근사)
const nodeMap = {};
const phi = Math.PI*(3-Math.sqrt(5));
NODES.forEach((n, i) => {
  const y = 1 - (i/NODES.length)*2;
  const r = Math.sqrt(1-y*y);
  const theta = phi*i;
  const spread = 28;
  n.x = r*Math.cos(theta)*spread;
  n.y = y*spread*0.8;
  n.z = r*Math.sin(theta)*spread;
  nodeMap[n.id] = n;
});

// 메시 생성
const meshes = [];
const labelSprites = [];
NODES.forEach(n => {
  const geo = new THREE.SphereGeometry(n.size, 32, 32);
  const col = COLOR[n.group] || 0x888888;
  const mat = new THREE.MeshPhongMaterial({
    color: col,
    emissive: col,
    emissiveIntensity: 0.4,
    transparent: true,
    opacity: 0.9,
    shininess: 80,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(n.x, n.y, n.z);
  mesh.userData = n;
  scene.add(mesh);
  meshes.push(mesh);
  n.mesh = mesh;

  // glow ring (이니셔티브/목표)
  if (n.group === 'initiative' || n.group === 'goal') {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(n.size+0.3, n.size+0.8, 32),
      new THREE.MeshBasicMaterial({ color: COLOR[n.group], side: THREE.DoubleSide, transparent:true, opacity:0.3 })
    );
    mesh.add(ring);
  }
});

// 엣지 (튜브)
EDGES.forEach(([a, b]) => {
  const na = nodeMap[a], nb = nodeMap[b];
  if (!na || !nb) return;
  const points = [];
  for (let t = 0; t <= 20; t++) {
    const p = t/20;
    const mx = (na.x+nb.x)/2, my = (na.y+nb.y)/2 + 3, mz = (na.z+nb.z)/2;
    points.push(new THREE.Vector3(
      na.x*(1-p)**2 + mx*2*p*(1-p) + nb.x*p**2,
      na.y*(1-p)**2 + my*2*p*(1-p) + nb.y*p**2,
      na.z*(1-p)**2 + mz*2*p*(1-p) + nb.z*p**2
    ));
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 20, 0.06, 6, false),
    new THREE.MeshBasicMaterial({ color:0x2a3a5a, transparent:true, opacity:0.5 })
  );
  tube.userData = { edgeA: a, edgeB: b };
  scene.add(tube);
});

// ── 마우스 컨트롤 ──────────────────────────────────────────────────────
let isDragging = false, lastX = 0, lastY = 0;
let rotX = 0, rotY = 0;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('mousedown', e => { isDragging=true; lastX=e.clientX; lastY=e.clientY; });
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  rotY += dx * 0.005; rotX += dy * 0.005;
  lastX = e.clientX; lastY = e.clientY;
});
renderer.domElement.addEventListener('mouseup', e => {
  if (Math.abs(e.clientX-lastX)<3 && Math.abs(e.clientY-lastY)<3) handleClick(e);
  isDragging = false;
});
renderer.domElement.addEventListener('wheel', e => {
  camera.position.z += e.deltaY * 0.05;
  camera.position.z = Math.max(10, Math.min(120, camera.position.z));
});

let selectedMesh = null;
function handleClick(e) {
  mouse.x = (e.clientX/W)*2-1;
  mouse.y = -(e.clientY/H)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length) showInfo(hits[0].object);
  else closeInfo();
}

function showInfo(mesh) {
  selectedMesh = mesh;
  const n = mesh.userData;
  document.getElementById('ip-title').textContent = n.label;

  let typeLabel = '';
  if (n.group === 'initiative') {
    typeLabel = `🚀 이니셔티브 · ${TEAMS[n.team]?.name||''} · ${n.desc||''}`;
  } else if (n.group === 'goal') {
    const parentNode = nodeMap[n.parent];
    typeLabel = `🎯 목표 · ${TEAMS[n.team]?.name||''} → ${parentNode?.label||''}`;
  } else if (n.group === 'me') {
    typeLabel = `👤 나 (${n.person}) · 개발팀`;
  } else if (n.group === 'team') {
    typeLabel = `👥 팀원 ${n.person} · 개발팀`;
  } else {
    typeLabel = `🔗 ${n.person} · ${TEAMS[n.team]?.name||'타팀'}`;
  }
  const colorHex = COLOR_HEX[n.group] || '#888';
  document.getElementById('ip-type').textContent = typeLabel;
  document.getElementById('ip-type').style.color = colorHex;

  const connected = EDGES.filter(([a,b]) => a===n.id||b===n.id)
    .map(([a,b]) => nodeMap[a===n.id?b:a]).filter(Boolean);
  document.getElementById('ip-list').innerHTML = connected.map(c => `
    <div class="ip-node" onclick="focusNode('${c.id}')">
      <div class="ip-dot" style="background:${COLOR_HEX[c.group]||'#888'}"></div>
      <span>${c.label}</span>
    </div>`).join('');

  document.getElementById('info-panel').style.display = 'block';

  // 하이라이트
  const connIds = new Set([n.id, ...connected.map(c=>c.id)]);
  meshes.forEach(m => {
    const inSet = connIds.has(m.userData.id);
    m.material.opacity = inSet ? 1 : 0.1;
    m.material.emissiveIntensity = inSet ? 0.7 : 0.05;
  });
}

function focusNode(id) {
  const n = nodeMap[id];
  if (n && n.mesh) showInfo(n.mesh);
}

function closeInfo() {
  document.getElementById('info-panel').style.display = 'none';
  meshes.forEach(m => { m.material.opacity=0.9; m.material.emissiveIntensity=0.4; });
  selectedMesh = null;
}

// ── 애니메이션 ────────────────────────────────────────────────────────
const group = new THREE.Group();
meshes.forEach(m => group.add(m));
// scene에서 제거하고 group에 추가는 복잡하므로 scene rotation 활용
let autoRotate = true;
scene.rotation.y = 0;

function animate() {
  requestAnimationFrame(animate);
  if (!isDragging && autoRotate) scene.rotation.y += 0.001;
  scene.rotation.x = rotX * 0.3;
  scene.rotation.y += isDragging ? 0 : 0.001;
  if (isDragging) { scene.rotation.x += (rotX - scene.rotation.x) * 0.1; }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
