<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#F85100" />
  <title>TeamFlow 💥</title>
  <style>
    :root {
      --primary: #F85100;
      --primary-light: #FF6114;
      --primary-bg: #FFEFE7;
      --primary-border: #FFCFBD;
      --bg-01: #FFFFFF;
      --bg-02: #F6F6F9;
      --bg-03: #EDEDF0;
      --text-01: #151515;
      --text-02: #454545;
      --text-03: #888888;
      --border: #E5E5E8;
      --high: #FF4242;
      --high-bg: #FFEEED;
      --medium: #FF6114;
      --medium-bg: #FFEFE7;
      --low: #1A9F46;
      --low-bg: #F0FDF4;
      --blue: #3B82F6;
      --blue-bg: #EFF6FF;
      --purple: #8B5CF6;
      --purple-bg: #F5F3FF;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --sidebar: 240px;
      --bottom-nav: 64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-02); color: var(--text-01);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login Screen ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; min-height: 100dvh;
      background: linear-gradient(135deg, #151515 0%, #2d1810 50%, #F85100 100%);
      padding: 20px;
    }
    .login-card {
      background: white; border-radius: 20px; padding: 40px 32px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 380px; width: 100%;
    }
    .login-logo { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 26px; font-weight: 800; color: var(--text-01); margin-bottom: 8px; }
    .login-sub { font-size: 14px; color: var(--text-03); margin-bottom: 32px; line-height: 1.6; }
    .btn-github {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px 24px; background: #24292e; color: white;
      border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.2s; min-height: 52px;
    }
    .btn-github:hover { background: #1a1e22; }
    .login-demo { margin-top: 16px; font-size: 12px; color: var(--text-03); }
    .btn-demo {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 20px; font-size: 13px; color: var(--text-02); cursor: pointer; margin-top: 8px;
      min-height: 44px; min-width: 160px;
    }
    .btn-demo:hover { background: var(--bg-02); }

    /* ── App Shell ── */
    #app { display: none; flex: 1; }
    .app-layout { display: flex; min-height: 100vh; min-height: 100dvh; }

    /* ── Sidebar (desktop) ── */
    .sidebar {
      width: var(--sidebar); background: var(--bg-01); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh;
      overflow-y: auto; z-index: 50; transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar-logo { padding: 20px 16px 12px; display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 16px; color: var(--primary); border-bottom: 1px solid var(--border); }
    .sidebar-logo span { font-size: 20px; }
    .sidebar-section { padding: 12px 8px 4px; font-size: 10px; font-weight: 700; color: var(--text-03); letter-spacing: 0.8px; text-transform: uppercase; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin: 1px 4px;
      border-radius: var(--radius-sm); font-size: 14px; color: var(--text-02);
      cursor: pointer; transition: background 0.15s, color 0.15s; border: none; background: none;
      width: calc(100% - 8px); text-align: left; min-height: 44px;
    }
    .nav-item:hover { background: var(--bg-02); color: var(--text-01); }
    .nav-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
    .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-user { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; overflow: hidden; flex-shrink: 0; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 11px; color: var(--text-03); }
    .btn-logout { background: none; border: none; font-size: 14px; color: var(--text-03); cursor: pointer; padding: 6px; min-width: 32px; }

    /* ── Mobile Header ── */
    .mobile-header {
      display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 60;
      height: 56px; background: var(--bg-01); border-bottom: 1px solid var(--border);
      align-items: center; padding: 0 16px; gap: 12px;
    }
    .mobile-header .logo-text { font-size: 16px; font-weight: 800; color: var(--primary); flex: 1; }
    .btn-hamburger {
      background: none; border: none; font-size: 22px; cursor: pointer; padding: 6px;
      color: var(--text-01); min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
    }
    .mobile-page-title { font-size: 15px; font-weight: 600; color: var(--text-01); }

    /* ── Drawer Overlay ── */
    .drawer-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90;
      animation: fadeIn 0.2s;
    }
    .drawer-overlay.open { display: block; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* ── Bottom Navigation (mobile) ── */
    .bottom-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
      height: var(--bottom-nav); background: var(--bg-01); border-top: 1px solid var(--border);
      padding: 0 4px; padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-nav-inner {
      display: flex; align-items: stretch; height: 100%; gap: 2px;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; border: none; background: none; cursor: pointer; padding: 6px 4px;
      border-radius: var(--radius-sm); transition: background 0.15s; color: var(--text-03);
      font-size: 10px; font-weight: 500; min-height: 48px;
    }
    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item .bnav-icon { font-size: 20px; line-height: 1; }
    .bottom-nav-more {
      position: fixed; bottom: calc(var(--bottom-nav) + 8px); right: 12px;
      background: var(--primary); color: white; border: none; border-radius: 50%;
      width: 48px; height: 48px; font-size: 22px; cursor: pointer; z-index: 61;
      box-shadow: var(--shadow-lg); display: none; align-items: center; justify-content: center;
      transition: transform 0.2s;
    }
    .bottom-nav-more:active { transform: scale(0.92); }

    /* ── Main content ── */
    .main-content {
      margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; min-height: 100vh;
    }
    .page-header {
      background: var(--bg-01); border-bottom: 1px solid var(--border);
      padding: 16px 28px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 40;
    }
    .page-title { font-size: 18px; font-weight: 700; }
    .page-date { font-size: 13px; color: var(--text-03); }
    .content-area { padding: 20px 24px; flex: 1; }

    /* ── Cards ── */
    .card { background: var(--bg-01); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); }
    .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .card-body { padding: 18px; }

    /* ── Grid layouts ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .col-span-2 { grid-column: span 2; }

    /* ── Todo input ── */
    .todo-input-area { margin-bottom: 18px; }
    .todo-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .todo-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px;
      font-size: 14px; font-family: inherit; transition: border-color 0.2s; background: var(--bg-01);
      min-height: 44px;
    }
    .todo-input:focus { outline: none; border-color: var(--primary); }
    .btn-add {
      background: var(--primary); color: white; border: none; border-radius: var(--radius-sm);
      padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
      min-height: 44px; min-width: 60px; transition: background 0.15s;
    }
    .btn-add:hover { background: var(--primary-light); }
    .btn-add:active { transform: scale(0.96); }

    /* AI Recommendation box */
    .ai-recommend-box {
      background: linear-gradient(135deg, var(--purple-bg), var(--primary-bg));
      border: 1px solid var(--primary-border); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 14px; display: none;
    }
    .ai-recommend-box.show { display: block; }
    .ai-recommend-label { font-size: 11px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .ai-recommend-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin: 4px 0;
      background: white; border-radius: var(--radius-sm); border: 1px solid var(--border);
      cursor: pointer; font-size: 13px; transition: border-color 0.15s; min-height: 44px;
    }
    .ai-recommend-item:hover { border-color: var(--primary); }
    .recommend-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
    .badge-initiative { background: var(--primary-bg); color: var(--primary); }
    .badge-goal { background: var(--blue-bg); color: var(--blue); }

    /* ── Focus card (Idea A) ── */
    .focus-card {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px; color: white;
    }
    .focus-label { font-size: 10px; font-weight: 700; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .focus-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .focus-reason { font-size: 12px; opacity: 0.85; }

    /* ── Todo list ── */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px;
      border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-01);
      transition: box-shadow 0.15s; animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    .todo-item.done { opacity: 0.5; }
    .todo-item.done .todo-title { text-decoration: line-through; }
    .todo-check {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; min-width: 22px;
    }
    .todo-check:hover { border-color: var(--primary); }
    .todo-check.checked { background: var(--primary); border-color: var(--primary); }
    .todo-check.checked::after { content:''; width:5px; height:8px; border:2px solid white; border-top:none; border-left:none; transform:rotate(45deg) translateY(-1px); }
    .todo-body { flex: 1; min-width: 0; }
    .todo-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; word-break: break-word; }
    .todo-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .tag-initiative { background: var(--primary-bg); color: var(--primary); }
    .tag-goal { background: var(--blue-bg); color: var(--blue); }
    .tag-none { background: var(--bg-03); color: var(--text-03); }
    .tag-pending { background: #FFF3CD; color: #856404; }
    .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-icon { width: 32px; height: 32px; border:none; border-radius: 6px; background:transparent; color:var(--text-03); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
    .btn-icon:hover { background: var(--bg-02); }
    .btn-icon.del:hover { background: var(--high-bg); color: var(--high); }

    /* ── Insight ── */
    .insight-stat { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .insight-stat:last-child { border-bottom: none; }
    .insight-label { font-size: 13px; color: var(--text-02); }
    .insight-value { font-size: 14px; font-weight: 700; }
    .progress-bar { height: 6px; background: var(--bg-03); border-radius: 3px; margin-top: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--primary); transition: width 0.5s; }

    /* ── Heatmap ── */
    .heat-0 { background: var(--bg-03); }
    .heat-1 { background: #FFE3D8; }
    .heat-2 { background: #FFAF8A; }
    .heat-3 { background: #FF6114; }
    .heat-4 { background: #F85100; }

    /* ── Team member rows ── */
    .member-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .member-row:last-child { border-bottom: none; }
    .member-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; flex-shrink: 0; }
    .member-avatar img { width:100%; height:100%; object-fit:cover; }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 13px; font-weight: 600; }
    .member-todo-count { font-size: 12px; color: var(--text-03); }
    .member-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .count-badge { font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 10px; }
    .cb-initiative { background: var(--primary-bg); color: var(--primary); }
    .cb-goal { background: var(--blue-bg); color: var(--blue); }
    .not-submitted { font-size: 11px; color: var(--high); font-weight: 600; background: var(--high-bg); padding: 2px 8px; border-radius: 10px; }

    /* ── Premise cards ── */
    .premise-list { display: flex; flex-direction: column; gap: 10px; }
    .premise-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; background: var(--bg-01); }
    .premise-type-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 6px; }
    .premise-initiative { background: var(--primary-bg); color: var(--primary); }
    .premise-goal { background: var(--blue-bg); color: var(--blue); }
    .premise-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .premise-desc { font-size: 13px; color: var(--text-02); }
    .premise-actions { display: flex; gap: 6px; margin-top: 10px; }
    .btn-sm { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; min-height: 36px; }
    .btn-primary-sm { background: var(--primary); color: white; }
    .btn-secondary-sm { background: var(--bg-02); color: var(--text-02); border: 1px solid var(--border); }

    /* ── Decompose box (Idea D) ── */
    .decompose-box { background: var(--purple-bg); border: 1px dashed var(--purple); border-radius: var(--radius); padding: 14px; margin-top: 12px; }
    .decompose-title { font-size: 13px; font-weight: 700; color: var(--purple); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

    /* ── Modals ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; display:flex; align-items:flex-end; justify-content:center; animation:fadeIn 0.15s; }
    .modal { background:white; border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-width:480px; box-shadow:var(--shadow-lg); padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
    .modal-title { font-size:16px; font-weight:700; margin-bottom:16px; }
    .modal-field { margin-bottom:14px; }
    .modal-label { font-size:12px; font-weight:600; color:var(--text-02); margin-bottom:5px; display:block; }
    .modal-input { width:100%; border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:11px 12px; font-size:14px; font-family:inherit; min-height:44px; }
    .modal-input:focus { outline:none; border-color:var(--primary); }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
    .btn-cancel { background:var(--bg-02); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer; min-height:44px; }
    .btn-confirm { background:var(--primary); color:white; border:none; border-radius:var(--radius-sm); padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer; min-height:44px; }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:calc(var(--bottom-nav) + 12px); left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--text-01); color:white; padding:10px 18px; border-radius:100px;
      font-size:13px; font-weight:500; z-index:999;
      transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap;
      max-width: calc(100vw - 40px); text-align: center;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* ── Empty state ── */
    .empty { text-align:center; padding:32px 16px; color:var(--text-03); }
    .empty .emoji { font-size:36px; margin-bottom:8px; }
    .empty p { font-size:13px; }

    /* ── Spinner ── */
    .spin { width:16px; height:16px; border:2px solid var(--primary-border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── 반응형: 태블릿 ── */
    @media (max-width: 1024px) {
      .grid-3 { grid-template-columns: 1fr 1fr; }
    }

    /* ── 반응형: 모바일 (768px 이하) ── */
    @media (max-width: 768px) {
      /* 사이드바 → 드로어로 전환 */
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
        z-index: 100;
        box-shadow: var(--shadow-lg);
      }
      .sidebar.open { transform: translateX(0); }

      /* 모바일 헤더 표시 */
      .mobile-header { display: flex; }

      /* 하단 네비게이션 표시 */
      .bottom-nav { display: flex; flex-direction: column; }
      .bottom-nav-more { display: flex; }

      /* 메인 콘텐츠 조정 */
      .main-content {
        margin-left: 0;
        padding-top: 56px;
        padding-bottom: var(--bottom-nav);
      }
      .page-header { display: none; }

      /* 컨텐츠 패딩 줄이기 */
      .content-area { padding: 14px 14px; }

      /* 그리드 → 단일 컬럼 */
      .grid-2 { grid-template-columns: 1fr; gap: 12px; }
      .grid-3 { grid-template-columns: 1fr; gap: 12px; }
      .col-span-2 { grid-column: span 1; }

      /* 카드 */
      .card-body { padding: 14px; }
      .card-header { padding: 12px 14px; }

      /* 투두 입력 */
      .todo-input { font-size: 16px; /* iOS 자동 줌 방지 */ }

      /* 히트맵 테이블 스크롤 */
      .heatmap-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      /* 멤버 배지 세로 */
      .member-badges { flex-direction: column; align-items: flex-end; }

      /* 모달 */
      .modal { border-radius: 20px 20px 0 0; }

      /* 토스트 위치 */
      .toast { bottom: calc(var(--bottom-nav) + 16px); }
    }

    /* ── 반응형: 소형 모바일 (375px 이하) ── */
    @media (max-width: 375px) {
      .login-card { padding: 32px 20px; }
      .content-area { padding: 12px 12px; }
      .focus-title { font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">💥</div>
    <div class="login-title">TeamFlow</div>

// teamMembers 계산 헬퍼
function buildTeamMembers(teamId) {
  return DEMO_USERS.filter(u => u.team_id === teamId).map(u => {
    const userTodos = (DEMO_TODOS[u.id] || []).map(t => ({
      ...t, todo_date: TODAY, user_id: u.id,
    }));
    return {
      user_id: u.id,
      username: u.name,
      avatar_url: '',
      emoji: u.emoji,
      total: userTodos.length,
      done: userTodos.filter(t => t.status === 'done').length,
      initiative_related: userTodos.filter(t => t.analysis?.relation === 'initiative').length,
      goal_related: userTodos.filter(t => t.analysis?.relation === 'goal').length,
    };
  });
}

function switchDemoUser(userId) {
  const user = DEMO_USERS.find(u => u.id === userId);
  if (!user) return;
  currentUser = { ...user, avatar_url: '', github_id: `demo_${userId}` };
  todos = (DEMO_TODOS[userId] || []).map(t => ({ ...t, todo_date: TODAY, user_id: userId }));
  premises = DEMO_PREMISES[user.team_id] || [];
  teamMembers = buildTeamMembers(user.team_id);
  refreshApp();
  showToast(`👤 ${user.emoji} ${user.name} (${DEMO_TEAMS.find(t=>t.id===user.team_id)?.name}) 뷰로 전환`);
  debugPanelRender();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  refreshApp();
  if (IS_LOCAL) debugPanelInit();
}

function refreshApp() {
  if (!currentUser) return;
  const av = document.getElementById('sidebar-avatar');
  const mav = document.getElementById('mobile-avatar');
  const initial = currentUser.emoji || currentUser.name?.[0] || '😊';
  if (currentUser.avatar_url) {
    if (av) av.innerHTML = `<img src="${currentUser.avatar_url}" />`;
    if (mav) mav.innerHTML = `<img src="${currentUser.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
  } else {
    if (av) av.textContent = initial;
    if (mav) mav.textContent = initial;
  }
  const teamName = DEMO_TEAMS.find(t => t.id === currentUser.team_id)?.name || '';
  if (document.getElementById('sidebar-username')) document.getElementById('sidebar-username').textContent = currentUser.name || currentUser.username;
  if (document.getElementById('sidebar-role')) document.getElementById('sidebar-role').textContent = `${currentUser.role === 'leader' ? '팀장' : '팀원'} · ${teamName}`;
  showPage('home');
}

// ── Drawer (모바일) ────────────────────────────────────────────────────────
function toggleDrawer() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('drawer-overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}
function closeDrawer() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('drawer-overlay')?.classList.remove('open');
}

// ── Navigation ─────────────────────────────────────────────────────────────
const pageTitles = { home:'오늘의 할일', history:'히스토리', insight:'주간 인사이트', team:'팀 대시보드', heatmap:'기여 히트맵', premises:'이니셔티브 / 목표' };

function showPage(page, navEl, bnavId) {
  closeDrawer();
  // 사이드바 active
  document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
  if (navEl && navEl.closest('.sidebar')) navEl.classList.add('active');
  else {
    const sidebarItems = [...document.querySelectorAll('.sidebar .nav-item')];
    const match = sidebarItems.find(n => n.textContent.trim().includes(pageTitles[page]?.split(' ')[0] || ''));
    if (match) match.classList.add('active');
  }
  // 하단 네비 active
  document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));
  const bnavMap = { home:'bnav-home', team:'bnav-team', heatmap:'bnav-heatmap', premises:'bnav-premises', insight:'bnav-insight', history:'bnav-home' };
  const bnavEl = document.getElementById(bnavId || bnavMap[page]);
  if (bnavEl) bnavEl.classList.add('active');

  const title = pageTitles[page] || page;
  if (document.getElementById('page-title')) document.getElementById('page-title').textContent = title;
  if (document.getElementById('mobile-page-title')) document.getElementById('mobile-page-title').textContent = title;

  const pages = { home: renderHome, history: renderHistory, insight: renderInsight, team: renderTeam, heatmap: renderHeatmap, premises: renderPremises };
  const fn = pages[page];
  if (fn) fn();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function relationTag(rel) {
  if (rel === 'initiative') return `<span class="tag tag-initiative">🚀 이니셔티브</span>`;
  if (rel === 'goal') return `<span class="tag tag-goal">🎯 목표</span>`;
  return `<span class="tag tag-none">— 미분류</span>`;
}

// ── AI Recommendation ──────────────────────────────────────────────────────
const AI_SUGGESTIONS = [
  { title:'DML 자동화 진행 현황 문서 업데이트', premise_type:'initiative', premise:'반복 업무 자동화' },
  { title:'슬랙 답장 봇 테스트 케이스 작성', premise_type:'goal', premise:'매일 답장 자동화' },
  { title:'결제 오류 패턴 분석 보고서 작성', premise_type:'goal', premise:'결제 오류 알림' },
  { title:'팀 자동화 스크립트 코드 리뷰', premise_type:'initiative', premise:'반복 업무 자동화' },
];

function showAiRecommend() {
  const box = document.getElementById('ai-recommend-box');
  if (!box) return;
  const picks = AI_SUGGESTIONS.slice(0, 2);
  box.innerHTML = `
    <div class="ai-recommend-label">✨ AI 추천 — 급한 아젠다 기반</div>
    ${picks.map(s => `
      <div class="ai-recommend-item" onclick="useRecommend('${esc(s.title)}')">
        <span class="recommend-badge ${s.premise_type==='initiative'?'badge-initiative':'badge-goal'}">${s.premise_type==='initiative'?'이니셔티브':'목표'}</span>
        <span style="flex:1;min-width:0;word-break:break-word">${esc(s.title)}</span>
        <span style="color:var(--text-03);font-size:11px;flex-shrink:0">${esc(s.premise)}</span>
      </div>
    `).join('')}
  `;
  box.classList.add('show');
}

function useRecommend(title) {
  const input = document.getElementById('todo-input-main');
  if (input) { input.value = title; input.focus(); }
  document.getElementById('ai-recommend-box')?.classList.remove('show');
  showToast('💡 AI 추천을 선택했어요!');
}

function onTodoInput(val) {
  if (val) document.getElementById('ai-recommend-box')?.classList.remove('show');
}

    <div class="focus-card">
      <div class="focus-label">🎯 오늘 집중할 1가지 (AI 추천)</div>
      <div class="focus-title">${esc(focusTodo.title)}</div>
      <div class="focus-reason">${focusTodo.analysis?.relation==='initiative'?'이니셔티브 기여도가 높은 작업입니다':'지금 가장 중요한 작업이에요'}</div>
    </div>` : ''}

    <div class="grid-2">
      <div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">📝 오늘의 할일 <span style="font-size:12px;color:var(--text-03);font-weight:400">${todayTodos.length}개 남음</span></div>
            <button onclick="triggerAnalysis()" style="background:var(--purple-bg);color:var(--purple);border:none;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;min-height:32px">⚡ AI 분석</button>
          </div>
          <div class="card-body">
            <div id="ai-recommend-box" class="ai-recommend-box"></div>
            <div class="todo-input-area">
              <div class="todo-input-row">
                <input id="todo-input-main" class="todo-input" placeholder="할일 입력... (Enter로 추가)"
                  onkeydown="if(event.key==='Enter')addTodo()"
                  oninput="onTodoInput(this.value)" autocomplete="off" />
                <button class="btn-add" onclick="addTodo()">추가</button>
              </div>
              <button onclick="showAiRecommend()" style="background:none;border:none;font-size:12px;color:var(--purple);cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 0;min-height:36px">
                ✨ AI 추천 받기
              </button>
            </div>
            <div class="todo-list" id="todo-list-active">
              ${todayTodos.length ? todayTodos.map(todoHTML).join('') : `<div class="empty"><div class="emoji">✍️</div><p>오늘의 할일을 추가해보세요!</p></div>`}
            </div>
            ${doneTodos.length ? `
            <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
              <div style="font-size:12px;font-weight:600;color:var(--text-03);margin-bottom:8px">✅ 완료 (${doneTodos.length})</div>
              <div class="todo-list">${doneTodos.map(todoHTML).join('')}</div>
            </div>` : ''}
          </div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="card">
          <div class="card-header"><div class="card-title">📈 오늘의 기여도</div></div>
          <div class="card-body">${contributionStats()}</div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">🎯 현재 목표</div>
            <button onclick="showPage('premises')" style="background:none;border:none;font-size:12px;color:var(--primary);cursor:pointer;min-height:32px">전체 보기</button>
          </div>

            ${premises.filter(p=>p.is_active).slice(0,3).map(p=>`
              <div style="padding:10px;background:var(--bg-02);border-radius:8px;margin-bottom:6px">
                <span class="premise-type-badge ${p.type==='initiative'?'premise-initiative':'premise-goal'}">${p.type==='initiative'?'이니셔티브':'목표'}</span>
                <div style="font-size:13px;font-weight:600">${esc(p.title)}</div>
              </div>
            `).join('') || '<div style="font-size:13px;color:var(--text-03)">설정된 목표가 없어요</div>'}
            <div class="decompose-box">
              <div class="decompose-title">🤖 소전제로 Todo 자동 생성</div>
              <select id="premise-select" style="width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:14px;margin-bottom:8px;min-height:44px;background:white">

function todoHTML(t) {
  const rel = t.analysis?.relation;
  return `
    <div class="todo-item ${t.status==='done'?'done':''}" id="ti-${t.id}">
      <div class="todo-check ${t.status==='done'?'checked':''}" onclick="toggleTodo(${t.id})"></div>
      <div class="todo-body">
        <div class="todo-title">${esc(t.title)}</div>
        <div class="todo-meta">
          ${rel ? relationTag(rel) : `<span class="tag tag-pending">분석 대기</span>`}
        </div>
      </div>
      <div class="todo-actions">
        <button class="btn-icon del" onclick="deleteTodo(${t.id})">🗑</button>
      </div>
    </div>`;
}

function contributionStats() {
  const total = todos.length;
  const initiative = todos.filter(t=>t.analysis?.relation==='initiative').length;
  const goal_cnt = todos.filter(t=>t.analysis?.relation==='goal').length;
  const done = todos.filter(t=>t.status==='done').length;
  const initiativePct = total ? Math.round(initiative/total*100) : 0;
  const donePct = total ? Math.round(done/total*100) : 0;
  return `
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;color:var(--text-02)">완료율</span>
          <span style="font-size:13px;font-weight:700">${done}/${total}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${donePct}%"></div></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;color:var(--text-02)">🎯 이니셔티브 기여</span>
          <span style="font-size:13px;font-weight:700;color:var(--primary)">${initiativePct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${initiativePct}%;background:var(--primary)"></div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <span class="tag tag-initiative">${initiative} 이니셔티브 연관</span>
        <span class="tag tag-goal">${goal_cnt} 목표 연관</span>
      </div>
    </div>`;
}

async function addTodo() {
  const input = document.getElementById('todo-input-main');
  const title = input?.value.trim();
  if (!title) { showToast('할일을 입력해주세요!'); return; }
  const newTodo = { id: Date.now(), user_id: currentUser.id, title, status:'todo', todo_date: new Date().toISOString().slice(0,10), analysis: null };
  todos.unshift(newTodo);
  input.value = '';
  renderHome();
  showToast('✅ 추가됐어요!');
}

async function toggleTodo(id) {
  const t = todos.find(x => x.id === id);
  if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  renderHome();
  showToast(t.status === 'done' ? '✅ 완료!' : '↩️ 미완료로 변경');
}

async function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  renderHome();
  showToast('🗑️ 삭제됐어요');
}

async function triggerAnalysis() {
  showToast('⚡ AI 분석 중...');
  setTimeout(() => {
    todos.forEach(t => {
      if (!t.analysis) {
        const rels = ['initiative','goal','none'];
        t.analysis = { relation: rels[Math.floor(Math.random()*3)], confidence: Math.random() };
      }
    });
    renderHome();
    showToast('✨ AI 분석 완료!');
  }, 1500);
}

async function decomposeFromPremise() {
  const sel = document.getElementById('premise-select');
  if (!sel?.value) { showToast('소전제를 선택해주세요'); return; }
  const premise = premises.find(p => p.id === parseInt(sel.value));
  if (!premise) return;
  showToast('🤖 Copilot이 분해 중...');
  setTimeout(() => {
    const generated = [
      `${premise.title} 관련 리서치 정리`,
      `${premise.title} 액션 플랜 작성`,
      `${premise.title} 진행상황 팀 공유`,
    ];
    generated.forEach(title => {
      todos.unshift({ id: Date.now() + Math.random(), user_id: currentUser.id, title, status:'todo', todo_date: new Date().toISOString().slice(0,10), analysis: { relation:'goal', confidence:0.88 } });
    });
    renderHome();
    showToast(`✨ ${generated.length}개 태스크가 생성됐어요!`);
  }, 1800);
}

// ── History Page ──────────────────────────────────────────────────────────
function renderHistory() {
  const done = todos.filter(t => t.status === 'done');
  document.getElementById('content-area').innerHTML = `
    <div class="card">
      <div class="card-header"><div class="card-title">📚 완료된 할일 히스토리</div></div>
      <div class="card-body">
        ${done.length ? done.map(t => `
          <div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:16px;flex-shrink:0">✅</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:500;word-break:break-word">${esc(t.title)}</div>
              <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">${t.analysis ? relationTag(t.analysis.relation) : ''}</div>
            </div>
            <button onclick="restoreTodo(${t.id})" style="background:var(--bg-02);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;flex-shrink:0;min-height:36px">복원</button>
          </div>
        `).join('') : `<div class="empty"><div class="emoji">📭</div><p>완료된 할일이 없어요</p></div>`}

}

function restoreTodo(id) {
  const t = todos.find(x => x.id === id);
  if (t) { t.status = 'todo'; renderHistory(); showToast('↩️ 복원됐어요!'); }
}

              ${m.goal_related>0?`<span class="count-badge cb-goal">${m.goal_related} 소전제</span>`:''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

// ── Heatmap ────────────────────────────────────────────────────────────────
let selectedPremiseId = null;
const contributionMatrix = {
  1: { 1:2, 2:1, 3:0, 4:1 },
  2: { 1:1, 2:0, 3:0, 4:2 },
  3: { 1:2, 2:3, 3:0, 4:0 },
  4: { 1:1, 2:0, 3:0, 4:0 },
  5: { 1:0, 2:0, 3:2, 4:0 },
};

function renderHeatmap() {
  selectedPremiseId = selectedPremiseId || (premises[0]?.id ?? null);
  const members = teamMembers;
  const matrix = selectedPremiseId ? (contributionMatrix[selectedPremiseId] || {}) : {};
  const maxVal = Math.max(1, ...Object.values(matrix));

  function heatLevel(count) {
    if (count === 0) return 0;
    return Math.ceil((count / maxVal) * 4);
  }

  document.getElementById('content-area').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text-03);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.6px">카테고리(전제) 선택</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${premises.map(p => `
          <button onclick="selectPremiseHeatmap(${p.id})"
            style="padding:7px 14px;border-radius:20px;border:1.5px solid ${selectedPremiseId===p.id?(p.type==='initiative'?'var(--primary)':'var(--blue)'):'var(--border)'};
            background:${selectedPremiseId===p.id?(p.type==='initiative'?'var(--primary-bg)':'var(--blue-bg)'):'white'};
            color:${selectedPremiseId===p.id?(p.type==='initiative'?'var(--primary)':'var(--blue)'):'var(--text-02)'};
            font-size:12px;font-weight:${selectedPremiseId===p.id?700:400};cursor:pointer;min-height:36px;">
            ${p.type==='initiative'?'🎯':'📌'} ${esc(p.title)}
          </button>
        `).join('')}
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title">🔥 팀원별 기여 현황</div>
          <div style="font-size:12px;color:var(--text-03)">${selectedPremiseId?esc(premises.find(p=>p.id===selectedPremiseId)?.title||''):'전체'}</div>
        </div>
        <div class="card-body">
          ${members.map(m => {
            const count = matrix[m.user_id] ?? 0;
            const level = heatLevel(count);
            const pct = m.total ? Math.round(count/m.total*100) : 0;
            return `
              <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
                <div class="member-avatar" style="flex-shrink:0">${m.username[0]||'?'}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:600;margin-bottom:4px">${esc(m.username)}</div>
                  <div style="display:flex;align-items:center;gap:8px">
                    <div style="flex:1;height:8px;background:var(--bg-03);border-radius:4px;overflow:hidden">
                      <div style="height:100%;width:${pct}%;background:${level>=3?'var(--primary)':level>=2?'#FF9266':'#FFD4C2'};border-radius:4px;transition:width 0.4s"></div>
                    </div>
                    <span style="font-size:12px;font-weight:700;color:${level>=3?'var(--primary)':'var(--text-02)'};width:36px;text-align:right">${count}건</span>
                  </div>
                </div>
              </div>`;
          }).join('')}
          <div style="display:flex;gap:6px;align-items:center;margin-top:12px;font-size:11px;color:var(--text-03)">
            <span>낮음</span>
            ${[0,1,2,3,4].map(l=>`<div style="width:14px;height:14px;border-radius:3px;background:${l===0?'var(--bg-03)':l===1?'#FFD4C2':l===2?'#FF9266':l===3?'#FF6114':'var(--primary)'}"></div>`).join('')}
            <span>높음</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">📊 전체 매트릭스</div></div>
        <div class="card-body" style="padding:12px">
          <div class="heatmap-table-wrap">
            <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:280px">
              <thead>
                <tr>
                  <th style="text-align:left;padding:6px 8px;color:var(--text-03);font-weight:600;border-bottom:2px solid var(--border)">전제</th>
                  ${members.map(m=>`<th style="padding:6px 4px;text-align:center;color:var(--text-03);font-weight:600;border-bottom:2px solid var(--border);min-width:44px">${esc(m.username.slice(0,2))}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${premises.map(p => {
                  const rowData = contributionMatrix[p.id] || {};
                  return `
                    <tr style="cursor:pointer" onclick="selectPremiseHeatmap(${p.id})">
                      <td style="padding:7px 8px;font-size:11px;font-weight:${selectedPremiseId===p.id?700:400};color:${selectedPremiseId===p.id?'var(--primary)':'var(--text-02)'};border-bottom:1px solid var(--border);max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                        ${p.type==='initiative'?'🎯':'📌'} ${esc(p.title.length>10?p.title.slice(0,10)+'…':p.title)}
                      </td>
                      ${members.map(m => {
                        const cnt = rowData[m.user_id] ?? 0;
                        const lv = heatLevel(cnt);
                        return `<td style="padding:4px;text-align:center;border-bottom:1px solid var(--border)">
                          <div style="width:28px;height:28px;border-radius:6px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
                            background:${cnt===0?'var(--bg-03)':lv>=4?'var(--primary)':lv>=3?'#FF6114':lv>=2?'#FF9266':'#FFD4C2'};
                            color:${cnt===0?'var(--text-03)':'white'}">
                            ${cnt||''}
                          </div>
                        </td>`;
                      }).join('')}
                    </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>`;
}

function selectPremiseHeatmap(premiseId) {
  selectedPremiseId = premiseId;
  renderHeatmap();
}

// ── Premises Page ──────────────────────────────────────────────────────────
function renderPremises() {
  const initiatives = premises.filter(p => p.type === 'initiative');
  const goals = premises.filter(p => p.type === 'goal');

  function goalCard(p) {
    const parent = initiatives.find(i => i.id === p.parent_id);
    return `
      <div class="premise-card" id="pc-${p.id}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span class="premise-type-badge premise-goal">목표</span>
          ${parent ? `<span style="font-size:11px;color:var(--primary);background:var(--primary-bg);padding:2px 8px;border-radius:10px;font-weight:600">↗ ${esc(parent.title)}</span>` : `<span style="font-size:11px;color:var(--text-03)">연결 없음</span>`}
        </div>
        <div class="premise-title">${esc(p.title)}</div>
        ${p.description ? `<div class="premise-desc">${esc(p.description)}</div>` : ''}
        <div class="premise-actions" style="align-items:center">
          <select onchange="mapGoalToInitiative(${p.id}, this.value)"
            style="flex:1;border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;background:var(--bg-02);color:var(--text-02);min-height:34px">
            <option value="">↗ 이니셔티브 연결...</option>
            ${initiatives.map(i => `<option value="${i.id}" ${p.parent_id===i.id?'selected':''}>${esc(i.title)}</option>`).join('')}
          </select>
          <button class="btn-sm ${p.is_active ? 'btn-primary-sm' : 'btn-secondary-sm'}" onclick="togglePremise(${p.id})">${p.is_active ? '활성' : '비활성'}</button>
          <button class="btn-sm btn-secondary-sm" onclick="deletePremise(${p.id})">삭제</button>
        </div>
      </div>`;
  }

  function initiativeCard(p) {
    const linked = goals.filter(g => g.parent_id === p.id);
    return `
      <div class="premise-card">
        <span class="premise-type-badge premise-initiative">이니셔티브</span>
        <div class="premise-title">${esc(p.title)}</div>
        ${p.description ? `<div class="premise-desc">${esc(p.description)}</div>` : ''}
        ${linked.length ? `
          <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
            ${linked.map(g => `<span style="font-size:11px;background:var(--blue-bg);color:var(--blue);padding:2px 8px;border-radius:10px;font-weight:500">🎯 ${esc(g.title)}</span>`).join('')}
          </div>` : ''}
        <div class="premise-actions">
          <button class="btn-sm ${p.is_active ? 'btn-primary-sm' : 'btn-secondary-sm'}" onclick="togglePremise(${p.id})">${p.is_active ? '활성' : '비활성'}</button>
          <button class="btn-sm btn-secondary-sm" onclick="deletePremise(${p.id})">삭제</button>
        </div>
      </div>`;
  }

  document.getElementById('content-area').innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button onclick="openPremiseModal('initiative')" style="background:var(--primary);color:white;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;min-height:44px">+ 이니셔티브 추가</button>
      <button onclick="openPremiseModal('goal')" style="background:var(--blue);color:white;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;min-height:44px">+ 목표 추가</button>
    </div>

    <!-- 이니셔티브 × 목표 계층 맵 -->
    ${initiatives.length ? `
    <div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <div class="card-title">🗺 이니셔티브 → 목표 연결 맵</div>
        <span style="font-size:12px;color:var(--text-03)">목표 카드에서 이니셔티브를 선택하세요</span>
      </div>
      <div class="card-body" style="padding:14px">
        <div style="display:flex;flex-direction:column;gap:10px">
          ${initiatives.map(i => {
            const linked = goals.filter(g => g.parent_id === i.id);
            return `
              <div style="display:flex;align-items:flex-start;gap:10px">
                <div style="background:var(--primary-bg);border:1.5px solid var(--primary-border);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--primary);min-width:160px;max-width:180px;flex-shrink:0">
                  🚀 ${esc(i.title)}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding-top:6px">
                  ${linked.length ? linked.map(g => `
                    <div style="background:var(--blue-bg);border:1px solid #c7d9f8;border-radius:8px;padding:5px 10px;font-size:12px;color:var(--blue);font-weight:500">
                      🎯 ${esc(g.title)}
                    </div>`).join('') : `<span style="font-size:12px;color:var(--text-03)">연결된 목표 없음</span>`}
                </div>
              </div>`;
          }).join('')}
          ${goals.filter(g => !g.parent_id).length ? `
            <div style="display:flex;align-items:flex-start;gap:10px">
              <div style="background:var(--bg-03);border:1.5px dashed var(--border);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--text-03);min-width:160px;max-width:180px;flex-shrink:0">
                미연결
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding-top:6px">
                ${goals.filter(g => !g.parent_id).map(g => `
                  <div style="background:var(--bg-02);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--text-02)">
                    🎯 ${esc(g.title)}
                  </div>`).join('')}
              </div>
            </div>` : ''}
        </div>
      </div>
    </div>` : ''}

    <div class="grid-2">
      <div class="card">
        <div class="card-header"><div class="card-title">🚀 이니셔티브</div><span style="font-size:12px;color:var(--text-03)">${initiatives.length}개</span></div>
        <div class="card-body">
          <div class="premise-list">
            ${initiatives.map(initiativeCard).join('') || '<div class="empty"><div class="emoji">🚀</div><p>이니셔티브를 추가해보세요</p></div>'}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🎯 목표</div><span style="font-size:12px;color:var(--text-03)">${goals.length}개</span></div>
        <div class="card-body">
          <div class="premise-list">
            ${goals.map(goalCard).join('') || '<div class="empty"><div class="emoji">🎯</div><p>목표를 추가해보세요</p></div>'}
          </div>
        </div>
      </div>
    </div>`;
}

function mapGoalToInitiative(goalId, initiativeId) {
  const p = premises.find(x => x.id === goalId);
  if (!p) return;
  p.parent_id = initiativeId ? parseInt(initiativeId) : null;
  renderPremises();
  const iName = initiativeId ? premises.find(x => x.id === parseInt(initiativeId))?.title : null;
  showToast(iName ? `🔗 "${iName}"에 연결됐어요!` : '🔗 연결이 해제됐어요');
}

function openPremiseModal(type) {
  const existing = document.getElementById('premise-modal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'premise-modal';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

  const initiatives = premises.filter(p => p.type === 'initiative');
  const parentSelect = type === 'goal' && initiatives.length ? `
    <div class="modal-field">
      <label class="modal-label">이니셔티브 연결 (선택)</label>
      <select class="modal-input" id="pm-parent" style="min-height:44px">
        <option value="">연결 없음</option>
        ${initiatives.map(i => `<option value="${i.id}">${esc(i.title)}</option>`).join('')}
      </select>
    </div>` : '';

  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${type === 'initiative' ? '🚀 이니셔티브' : '🎯 목표'} 추가</div>
      <div class="modal-field">
        <label class="modal-label">제목</label>
        <input class="modal-input" id="pm-title" placeholder="${type === 'initiative' ? '예: 반복 업무 자동화하기' : '예: DML 처리 자동화'}" autocomplete="off" />
      </div>
      <div class="modal-field">
        <label class="modal-label">설명 (선택)</label>
        <input class="modal-input" id="pm-desc" placeholder="구체적인 목표나 기준" autocomplete="off" />
      </div>
      ${parentSelect}
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-confirm" onclick="savePremise('${type}')">저장</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('pm-title')?.focus(), 100);
}

function savePremise(type) {
  const title = document.getElementById('pm-title')?.value.trim();
  if (!title) { showToast('제목을 입력해주세요'); return; }
  const parentId = document.getElementById('pm-parent')?.value
    ? parseInt(document.getElementById('pm-parent').value) : null;
  premises.push({
    id: Date.now(), type, title,
    description: document.getElementById('pm-desc')?.value || '',
    team_id: currentUser.team_id, parent_id: parentId, is_active: 1,
  });
  closeModal();
  renderPremises();
  showToast(`✅ ${type === 'initiative' ? '이니셔티브' : '목표'}가 추가됐어요!`);
}

function togglePremise(id) {
  const p = premises.find(x=>x.id===id);
  if (p) { p.is_active = p.is_active ? 0 : 1; renderPremises(); }
}

function deletePremise(id) {
  premises = premises.filter(p=>p.id!==id);
  renderPremises();
  showToast('🗑️ 삭제됐어요');
}

function closeModal() { document.getElementById('premise-modal')?.remove(); }

// ── 디버그 패널 (localhost 전용) ──────────────────────────────────────────
let debugPanelTeam = 1;

function debugPanelInit() {
  if (document.getElementById('debug-panel')) return;

  const style = document.createElement('style');
  style.textContent = `
    #debug-panel {
      position: fixed; bottom: 20px; left: 16px; z-index: 9999;
      background: rgba(15, 17, 23, 0.96); backdrop-filter: blur(12px);
      border: 1px solid rgba(248,81,0,0.35); border-radius: 14px;
      padding: 12px 14px; width: 226px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-family: -apple-system, sans-serif;
      transition: transform 0.2s, opacity 0.2s;
    }
    #debug-panel.collapsed { transform: translateY(calc(100% - 36px)); }
    #debug-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; cursor: pointer; user-select: none;
    }
    #debug-panel-header .dp-title {
      font-size: 11px; font-weight: 700; color: #f85100;
      text-transform: uppercase; letter-spacing: 0.8px;
      display: flex; align-items: center; gap: 5px;
    }
    #debug-panel-header .dp-badge {
      font-size: 9px; background: rgba(248,81,0,0.2); color: #f85100;
      padding: 2px 6px; border-radius: 10px; border: 1px solid rgba(248,81,0,0.3);
    }
    #debug-panel-header .dp-toggle { color: #555; font-size: 14px; }
    .dp-teams {
      display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .dp-team-btn {
      font-size: 11px; padding: 4px 9px; border-radius: 20px; cursor: pointer;
      border: 1px solid #2a2e3a; background: #1a1e2a; color: #8b949e;
      transition: all 0.15s; font-weight: 500;
    }
    .dp-team-btn.active { background: rgba(248,81,0,0.15); color: #f85100; border-color: rgba(248,81,0,0.4); font-weight: 700; }
    .dp-members { display: flex; flex-direction: column; gap: 3px; }
    .dp-member-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 8px; cursor: pointer;
      border: 1px solid transparent; background: transparent;
      text-align: left; width: 100%; transition: background 0.15s;
    }
    .dp-member-btn:hover { background: rgba(255,255,255,0.05); }
    .dp-member-btn.active { background: rgba(248,81,0,0.1); border-color: rgba(248,81,0,0.3); }
    .dp-avatar { width: 24px; height: 24px; border-radius: 50%; background: #2a2e3a; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .dp-info { flex: 1; min-width: 0; }
    .dp-name { font-size: 12px; font-weight: 600; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dp-role { font-size: 10px; color: #555; }
    .dp-cur { font-size: 10px; color: #f85100; margin-left: auto; flex-shrink: 0; }
  `;
  document.head.appendChild(style);

  const panel = document.createElement('div');
  panel.id = 'debug-panel';
  panel.innerHTML = `
    <div id="debug-panel-header" onclick="debugToggleCollapse()">
      <div class="dp-title">🛠 <span>Dev Panel</span> <span class="dp-badge">LOCAL</span></div>
      <span class="dp-toggle" id="dp-toggle-icon">▾</span>
    </div>
    <div id="debug-panel-body">
      <div class="dp-teams" id="dp-teams"></div>
      <div class="dp-members" id="dp-members"></div>
    </div>
  `;
  document.body.appendChild(panel);
  debugPanelRender();
}

function debugToggleCollapse() {
  const panel = document.getElementById('debug-panel');
  const icon = document.getElementById('dp-toggle-icon');
  panel.classList.toggle('collapsed');
  icon.textContent = panel.classList.contains('collapsed') ? '▴' : '▾';
}

function debugPanelRender() {
  const teamsEl = document.getElementById('dp-teams');
  const membersEl = document.getElementById('dp-members');
  if (!teamsEl || !membersEl) return;

  teamsEl.innerHTML = DEMO_TEAMS.map(t => `
    <button class="dp-team-btn ${t.id === debugPanelTeam ? 'active' : ''}"
      onclick="debugSelectTeam(${t.id})">${t.name}</button>
  `).join('');

  const members = DEMO_USERS.filter(u => u.team_id === debugPanelTeam);
  membersEl.innerHTML = members.map(u => `
    <button class="dp-member-btn ${u.id === currentUser?.id ? 'active' : ''}"
      onclick="switchDemoUser(${u.id})">
      <div class="dp-avatar">${u.emoji}</div>
      <div class="dp-info">
        <div class="dp-name">${u.name}</div>
        <div class="dp-role">${u.role === 'leader' ? '👑 팀장' : '팀원'}</div>
      </div>
      ${u.id === currentUser?.id ? '<span class="dp-cur">● 현재</span>' : ''}
    </button>
  `).join('');
}

function debugSelectTeam(teamId) {
  debugPanelTeam = teamId;
  const firstMember = DEMO_USERS.find(u => u.team_id === teamId);
  if (firstMember) switchDemoUser(firstMember.id);
  else debugPanelRender();
}

// ── Logout ─────────────────────────────────────────────────────────────────
function logout() {
  fetch('/auth/logout', { method:'POST', credentials:'include' }).finally(() => location.reload());
}
</script>
</body>
</html>
