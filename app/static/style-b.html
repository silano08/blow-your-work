<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>스타일 B — 홀로그램 사이버</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000510;overflow:hidden;height:100vh;font-family:-apple-system,sans-serif;color:#fff}
#label{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,5,16,0.8);backdrop-filter:blur(12px);border:1px solid rgba(0,229,255,0.2);border-radius:100px;padding:8px 22px;font-size:13px;font-weight:700;color:#00e5ff;letter-spacing:1px;text-shadow:0 0 10px rgba(0,229,255,0.6)}
#badge{position:fixed;top:56px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(0,229,255,0.4)}
#pick{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:transparent;border:1.5px solid #00e5ff;border-radius:100px;padding:12px 32px;font-size:13px;font-weight:700;color:#00e5ff;cursor:pointer;box-shadow:0 0 20px rgba(0,229,255,0.3),inset 0 0 20px rgba(0,229,255,0.05)}
</style></head><body>
<div id="label">⚡ 스타일 B — 홀로그램 사이버펑크</div>
<div id="badge">와이어프레임 외피 + 네온 코어 + 스캔라인 링</div>
<button id="pick" onclick="alert('B 선택!')">이 스타일 선택</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const W=window.innerWidth,H=window.innerHeight;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000510);
scene.fog=new THREE.FogExp2(0x000510,0.007);
const camera=new THREE.PerspectiveCamera(55,W/H,0.1,500);
camera.position.set(0,0,70);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x001122,6));
const pl1=new THREE.PointLight(0x00e5ff,3,180);pl1.position.set(40,30,40);scene.add(pl1);
const pl2=new THREE.PointLight(0xff00aa,2,120);pl2.position.set(-30,-20,20);scene.add(pl2);

// 그리드 (바닥)
const grid=new THREE.GridHelper(120,30,0x001a2a,0x001a2a);
grid.position.y=-20;
scene.add(grid);

// 별
const sg=new THREE.BufferGeometry();
const sp=new Float32Array(6000);
for(let i=0;i<6000;i++)sp[i]=(Math.random()-0.5)*500;
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x00e5ff,size:0.15,opacity:0.3,transparent:true})));

const NEON={initiative:0x00e5ff,goal:0xff00aa,dev:0x4d9eff,plan:0xb45eff,sales:0x00ff88,acct:0xff9f43};
const NODES=[
  {label:'반복업무 자동화',type:'initiative',color:NEON.initiative,pos:[0,12,0],size:3.0},
  {label:'결제 안정성',   type:'initiative',color:NEON.goal,       pos:[-14,5,5],size:2.7},
  {label:'Q3 매출 달성',  type:'initiative',color:0xffdd00,        pos:[14,5,-5],size:2.8},
  {label:'DML 자동화',    type:'goal',color:NEON.dev, pos:[-6,0,8],size:1.7},
  {label:'CI/CD 구축',    type:'goal',color:NEON.dev, pos:[6,0,8], size:1.6},
  {label:'오류 감지',     type:'goal',color:NEON.acct,pos:[-14,-4,0],size:1.6},
  {label:'DML 스크립트',  type:'todo',color:NEON.dev, pos:[-10,-10,5],size:0.9,done:true},
  {label:'Docker 최적화', type:'todo',color:NEON.dev, pos:[2,-10,5], size:0.9,done:true},
  {label:'UX 인터뷰',     type:'todo',color:NEON.plan,pos:[10,-8,-5],size:0.9,done:false},
  {label:'신규 리드',     type:'todo',color:NEON.sales,pos:[16,-10,2],size:0.9,done:false},
];

const meshGroup=new THREE.Group();
scene.add(meshGroup);

NODES.forEach(n=>{
  const g=new THREE.Group();
  // 네온 코어
  const core=new THREE.Mesh(
    new THREE.SphereGeometry(n.size*0.4,20,20),
    new THREE.MeshBasicMaterial({color:n.color})
  );
  g.add(core);
  // 빛나는 중간 레이어
  const glow=new THREE.Mesh(
    new THREE.SphereGeometry(n.size*0.65,20,20),
    new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.12})
  );
  g.add(glow);
  // 와이어프레임 외피
  const wf=new THREE.Mesh(
    new THREE.IcosahedronGeometry(n.size,1),
    new THREE.MeshBasicMaterial({color:n.color,wireframe:true,transparent:true,opacity:0.35})
  );
  g.add(wf);
  wf.userData.spin=true;

  // 이니셔티브: 스캔라인 링 + 헥사곤
  if(n.type==='initiative'){
    for(let i=0;i<3;i++){
      const ring=new THREE.Mesh(
        new THREE.TorusGeometry(n.size*(0.9+i*0.35),0.04,4,64),
        new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.6-i*0.15})
      );
      ring.rotation.x=Math.PI/2;
      ring.userData.scanY=0.02*(i+1)*(i%2===0?1:-1);
      g.add(ring);
      g.userData.scanRings=g.userData.scanRings||[];
      g.userData.scanRings.push(ring);
    }
    // 수직 링
    const vring=new THREE.Mesh(
      new THREE.TorusGeometry(n.size*1.1,0.04,4,64),
      new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.3})
    );
    g.add(vring);
    g.userData.vring=vring;
  }

  g.position.set(...n.pos);
  g.userData.nodeData=n;
  meshGroup.add(g);
  n._group=g;
});

// 엣지 (발광선)
const EDGES=[[0,3],[0,4],[1,5],[3,6],[3,7],[4,7],[2,9]];
EDGES.forEach(([a,b])=>{
  const na=NODES[a],nb=NODES[b];
  const pts=[];
  for(let t=0;t<=20;t++){
    const p=t/20;
    pts.push(new THREE.Vector3(
      na.pos[0]*(1-p)+nb.pos[0]*p,
      na.pos[1]*(1-p)+3*Math.sin(Math.PI*p)+nb.pos[1]*p,
      na.pos[2]*(1-p)+nb.pos[2]*p
    ));
  }
  scene.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),20,0.04,4,false),
    new THREE.MeshBasicMaterial({color:0x003355,transparent:true,opacity:0.8})
  ));
  // 이중 엣지 (발광)
  scene.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),20,0.015,4,false),
    new THREE.MeshBasicMaterial({color:0x0088cc,transparent:true,opacity:0.5})
  ));
});

let rotY=0,isDrag=false,lx=0;
renderer.domElement.addEventListener('mousedown',e=>{isDrag=true;lx=e.clientX});
renderer.domElement.addEventListener('mousemove',e=>{if(!isDrag)return;rotY+=(e.clientX-lx)*0.004;lx=e.clientX});
renderer.domElement.addEventListener('mouseup',()=>isDrag=false);
renderer.domElement.addEventListener('wheel',e=>{camera.position.z=Math.max(20,Math.min(120,camera.position.z+e.deltaY*0.05))},{passive:true});

let t=0;
function animate(){
  requestAnimationFrame(animate);t+=0.016;
  if(!isDrag)meshGroup.rotation.y+=0.002;
  meshGroup.children.forEach(g=>{
    const nd=g.userData.nodeData;if(!nd)return;
    // 와이어프레임 회전
    g.children.forEach(c=>{if(c.userData.spin){c.rotation.y+=0.01;c.rotation.x+=0.005;}});
    // 스캔링 이동 (위아래)
    (g.userData.scanRings||[]).forEach(r=>{
      r.position.y+=r.userData.scanY;
      if(Math.abs(r.position.y)>nd.size*1.3)r.userData.scanY*=-1;
    });
    // 수직링 회전
    if(g.userData.vring)g.userData.vring.rotation.y+=0.015;
    // 호흡
    if(nd.type==='initiative'){const s=1+0.03*Math.sin(t*1.5);g.scale.set(s,s,s);}
  });
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
</script></body></html>
